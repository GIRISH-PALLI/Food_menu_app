<html>
<body>

<h1>Change the name content</h1>
<h2 id="hcontents">Hello Guest??</h2>

<h3>Welcome to JavaScript</h3>
<button type="button" onClick="document.getElementById('hcontents').innerHTML='Hello GIRISH!'">GIRISH</button>
<button type="button" onClick="document.getElementById('hcontents').innerHTML='Hello RAMANA!'">RAMANA</button>

<h1>Change in Attributes</h1>
<img id="image" src="images (10).jpg" width="100"><br>
<button type="button" onClick="document.getElementById('image').src='images.png'">Down</button>
<button type="button" onClick="document.getElementById('image').src='image.jpg'">Banner</button>

<h1>Change in CSS</h1>
<h2 id="text">Introduction to JavaScript</h2>
<button type="button" onClick="document.getElementById('text').style.color='red'">Red</button>
<button type="button" onClick="document.getElementById('text').style.color='blue'">Blue</button>
<button type="button" onClick="document.getElementById('text').style.color='green'">Green</button>

<h1>Hide and Display the Contents</h1>
<h2 id="hidedisplay">This content can be hidden and displayed</h2>
<button type="button" onClick="document.getElementById('hidedisplay').style.display='none'">Hide</button>
<button type="button" onClick="document.getElementById('hidedisplay').style.display='block'">Display</button>

</body>
</html>
